/// Base types required for various RPCs.

syntax = "proto3";
package snowballr;

// Just an empty object. Use when there's no parameter or return value.
message Nothing {
}

// An arbitrary ID. Use for RPCs related to single entities.
message Id {
  string id = 1;
}

// An email as defined by RFC 5322.
message Email {
  string email = 1;
}

// A boolean value.
message BoolValue {
  bool value = 1;
}

// Binary data.
message Blob {
  bytes data = 1;
}
