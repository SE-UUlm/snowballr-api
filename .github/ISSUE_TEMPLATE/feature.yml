name: Feature request
description: Suggest an idea for this project
title: "[Feature]: <title>"
labels: ["enhancement"]
projects: ["SE-UUlm/2"]

body:
    - type: checkboxes
      id: existing-issue
      attributes:
          label: Is there an existing issue for this?
          description: Please check whether this feature request has already been reported.
          options:
              - label: I have searched the existing issues
                required: true

    - type: textarea
      id: description
      attributes:
          label: Is your feature request related to a problem? Please describe
          description: A clear and concise description of what the problem is.
          placeholder: I'm always frustrated when [...]
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Describe the solution you'd like
          description: A clear and concise description of what you want to happen.
          placeholder: When I call the method [...] I want to [...]
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Describe alternatives you've considered
          description: A clear and concise description of any alternative solutions or features you've considered.
      validations:
          required: false

    - type: textarea
      id: additional-context
      attributes:
          label: Anything else?
          description: |
              Links? References? Anything that will give us more context about the feature you want us to add!

              Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
      validations:
          required: false
